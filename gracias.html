<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensaje enviado - Infors Computación SpA</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: #fff;
      padding: 80px 20px;
    }
    .hero h1 {
      color: #ffeb3b;
      font-size: 2.4em;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }
    .btn-info {
      display: inline-block;
      padding: 12px 24px;
      background-color: #ffeb3b;
      color: #0d47a1;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background 0.3s ease;
    }
    .btn-info:hover {
      background-color: #fbc02d;
    }
    footer {
      margin-top: 80px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>✅ ¡Gracias por tu mensaje!</h1>
    <p>Tu consulta ha sido enviada correctamente. Te responderemos a la brevedad.</p>
    <a href="index.html" class="btn-info">Volver al sitio</a>
  </section>

  <footer>
    © 2026 Infors Computación SpA — Todos los derechos reservados.
  </footer>
</body>
</html>
