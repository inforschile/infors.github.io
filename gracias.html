<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gracias por tu mensaje</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #0d47a1, #1976d2);
      color: #fff;
    }
    .logo {
      position: fixed;
      top: 20px;
      left: 20px;
      height: 60px;
      z-index: 1000;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      color: #ffeb3b;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background-color: #ffeb3b;
      color: #0d47a1;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: background 0.3s ease;
    }
    a:hover {
      background-color: #fbc02d;
    }
  </style>
</head>
<body>
  <!-- Logo flotante -->
  <img src="imagenes/logo.png" alt="Infors" class="logo">

  <h1>✅ ¡Gracias por tu mensaje!</h1>
  <p>Tu consulta fue enviada correctamente. Te responderemos pronto.</p>
  <a href="index.html">Volver al inicio</a>

  <footer style="margin-top: 80px; font-size: 0.9em;">
    © 2026 Infors Computación SpA — Todos los derechos reservados.
  </footer>
</body>
</html>
