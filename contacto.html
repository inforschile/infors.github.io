<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Infors Computación SpA</title>
  <link rel="stylesheet" href="styles.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <header class="navbar">
    <img src="img/logo.png" alt="Infors" class="logo">
    <nav> 
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="hero">
      <h1>Contáctanos</h1>
      <p>Estamos aquí para ayudarte</p>
    </section>

    <section class="contacto" id="contacto">
      <h2>Medios de contacto</h2>

      <div class="contact-icons">
        <a href="https://wa.me/56998800550" target="_blank" title="WhatsApp">
          <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="mailto:contacto@infors.cl" title="Correo">
          <i class="fa-solid fa-envelope"></i>
        </a>
        <a href="tel:+56998800550" title="Teléfono">
          <i class="fa-solid fa-phone"></i>
        </a>
        <a href="https://www.instagram.com/infors.cl?igsh=emRwaDZ5aGU5ZTZm&utm_source=qr" target="_blank" title="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
      </div>

      <div id="form-status" style="margin: 20px auto; font-weight: bold; text-align: center; display: none; max-width: 500px; padding: 12px; border-radius: 6px;"></div>

      <form id="contact-form" class="contact-form">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="Tu correo" required>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit" id="btn-submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    © 2026 Infors Computación SpA — Todos los derechos reservados.
  </footer>

  <script src="script.js?v=2"></script>
  <script>
    // Debug: verifica que el JS cargó
    console.log('contacto.html cargado. Form:', document.getElementById('contact-form'));
  </script>
</body>
</html>
