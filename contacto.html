<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Infors Computación SpA</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Font Awesome para íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">Infors</a>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="contacto.html" class="active">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Contáctanos</h1>
    <p>Estamos aquí para ayudarte con tus proyectos tecnológicos.</p>
  </section>

  <section class="contacto">
    <div class="contact-icons">
      <a href="https://wa.me/56998800550" target="_blank" title="WhatsApp">
        <i class="fab fa-whatsapp fa-2x"></i>
      </a>
      <a href="https://instagram.com/tuusuario" target="_blank" title="Instagram">
        <i class="fab fa-instagram fa-2x"></i>
      </a>
    </div>

    <form class="contact-form" action="https://formspree.io/f/xwvjvyww" method="POST">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="email">Correo:</label>
      <input type="email" id="email" name="email" required>

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

      <button type="submit">Enviar</button>
    </form>
    <div id="form-message" style="margin-top:10px; font-weight:bold;"></div>
  </section>

  <footer>
    <p>&copy; 2026 Infors Computación SpA - Todos los derechos reservados</p>
  </footer>

  <script>
    const form = document.querySelector(".contact-form");
    const formMessage = document.getElementById("form-message");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.reset();
        formMessage.style.color = "green";
        formMessage.textContent = "✅ Gracias por tu mensaje. Te responderemos pronto.";
      } else {
        formMessage.style.color = "red";
        formMessage.textContent = "❌ Error al enviar. Intenta nuevamente.";
      }
    });
  </script>
</body>
</html>
