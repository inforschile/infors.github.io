<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Infors Computación SpA</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/TU_KIT.js" crossorigin="anonymous"></script>
</head>

<body>

  <!-- Barra superior -->
  <header class="navbar">
    <img src="img/logo.png" alt="Infors" class="logo">
    <nav> 
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero" id="hero">
    <h1>Contáctanos</h1>
    <p>Estamos aquí para ayudarte</p>
  </section>

  <!-- Sección de contacto -->
  <section class="contacto" id="contacto">
    <h2>Medios de contacto</h2>

    <!-- Íconos de contacto -->
    <div class="contact-icons">
      <a href="https://wa.me/56998800550" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
      <a href="mailto:contacto@infors.cl"><i class="fa-solid fa-envelope"></i></a>
      <a href="tel:+56998800550"><i class="fa-solid fa-phone"></i></a>
      <a href="https://www.instagram.com/infors.cl?igsh=emRwaDZ5aGU5ZTZm&utm_source=qr" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>

    <!-- Formulario -->
    <form class="contact-form">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" placeholder="Tu correo" required>

      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    © 2026 Infors Computación SpA — Todos los derechos reservados.
  </footer>

</body>
</html>
